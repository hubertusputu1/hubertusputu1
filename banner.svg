    <g transform="translate(94, 282)">
      <rect width="118" height="34" rx="17" fill="#11203a" stroke="#2F81F7" stroke-opacity="0.5"/>
      <text x="59" y="22" fill="#7fb0ff" text-anchor="middle">TypeScript</text>
    </g>
    <g transform="translate(224, 282)">
      <rect width="64" height="34" rx="17" fill="#10241c" stroke="#3FCF8E" stroke-opacity="0.5"/>
      <text x="32" y="22" fill="#69e0a8" text-anchor="middle">Go</text>
    </g>
    <g transform="translate(300, 282)">
      <rect width="96" height="34" rx="17" fill="#11203a" stroke="#2F81F7" stroke-opacity="0.5"/>
      <text x="48" y="22" fill="#7fb0ff" text-anchor="middle">React</text>
