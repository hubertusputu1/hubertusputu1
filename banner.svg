    <circle cx="18" cy="0" r="5" fill="#3FCF8E"/>
    <circle cx="36" cy="0" r="5" fill="#2F81F7"/>
    <text x="60" y="5" fill="#7d8aa8" font-size="16" font-family="'Fira Code', monospace">~/hubertusputu1 : git push</text>
  </g>

  <!-- name -->
  <text x="92" y="168" fill="url(#nameGrad)" font-size="62" font-weight="800" letter-spacing="-1">Hubertus Putu</text>

  <!-- tagline -->
