      <circle cx="22" cy="20" r="5" fill="#3FCF8E"/>
      <text x="42" y="26" fill="#c7d3ee" font-size="17">EvoCV</text>
      <text x="300" y="26" fill="#3FCF8E" font-size="12" text-anchor="end">LIVE</text>
    </g>
    <g transform="translate(0,104)">
      <rect width="320" height="40" rx="10" fill="#0f1a30" stroke="#1c2742"/>
      <circle cx="22" cy="20" r="5" fill="#F38020"/>
      <text x="42" y="26" fill="#c7d3ee" font-size="17">DomiSol</text>
      <text x="300" y="26" fill="#f0a35e" font-size="12" text-anchor="end">BETA</text>
    </g>
    <g transform="translate(0,156)">
      <rect width="320" height="40" rx="10" fill="#0f1a30" stroke="#1c2742"/>
      <circle cx="22" cy="20" r="5" fill="#2F81F7"/>
      <text x="42" y="26" fill="#c7d3ee" font-size="17">Gitkonek</text>
