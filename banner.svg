<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2F81F7"/>
      <stop offset="0.5" stop-color="#3FCF8E"/>
      <stop offset="1" stop-color="#F38020"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbd5f5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#2F81F7" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2F81F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2742" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="20" fill="url(#grid)" opacity="0.5"/>
  <rect width="1280" height="340" rx="20" fill="url(#glow)"/>
  <rect x="2" y="2" width="1276" height="336" rx="18" fill="none" stroke="#1c2742" stroke-width="2"/>

  <!-- left accent bar -->
